<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#005228",
                        "secondary": "#006d37",
                        "on-primary-fixed-variant": "#404273",
                        "inverse-surface": "#2e3132",
                        "surface": "#f8f9fa",
                        "background": "#f8f9fa",
                        "primary-fixed-dim": "#c1c1fc",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed": "#141545",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#8e80b8",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#1f1244",
                        "on-tertiary-fixed-variant": "#4b3f72",
                        "tertiary-fixed": "#e8deff",
                        "secondary-container": "#6bfe9c",
                        "surface-tint": "#585a8d",
                        "primary-container": "#1a1b4b",
                        "tertiary-fixed-dim": "#cdbefa",
                        "tertiary-container": "#241849",
                        "surface-container-highest": "#e1e3e4",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-dim": "#d9dadb",
                        "on-secondary-fixed": "#00210c",
                        "surface-container-high": "#e7e8e9",
                        "on-surface": "#191c1d",
                        "on-background": "#191c1d",
                        "on-primary-container": "#8384ba",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#c1c1fc",
                        "outline": "#777680",
                        "tertiary": "#0c0030",
                        "primary-fixed": "#e1e0ff",
                        "on-surface-variant": "#46464f",
                        "outline-variant": "#c8c5d0",
                        "on-secondary-container": "#00743a",
                        "secondary-fixed": "#6bfe9c",
                        "surface-container-low": "#f3f4f5",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#4ae183",
                        "primary": "#020135"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "container-margin": "20px",
                        "unit": "4px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "numeric-xl": ["Manrope"],
                        "h1": ["Manrope"],
                        "display": ["Manrope"],
                        "h2": ["Manrope"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "numeric-xl": ["36px", {"lineHeight": "44px", "fontWeight": "700"}],
                        "h1": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "h2": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-between overflow-hidden">
<!-- Shell Suppression: Onboarding is a linear/transactional flow, so BottomNavBar and SideNav are excluded. -->
<!-- Top AppBar Style Execution from JSON -->
<header class="fixed top-0 left-0 w-full flex items-center justify-between px-5 h-16 bg-slate-50 border-b border-slate-200 shadow-sm z-50">
<div class="flex items-center gap-3">
<span class="text-lg font-extrabold tracking-tighter text-indigo-950 uppercase font-manrope">Restart</span>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 hover:bg-slate-100 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<main class="flex-1 w-full max-w-md flex flex-col items-center justify-center px-container-margin mt-16 pb-24">
<!-- Illustration Section with Asymmetric UI Pattern -->
<div class="relative w-full aspect-square flex items-center justify-center mb-lg">
<!-- Background Decorative Element -->
<div class="absolute inset-0 bg-secondary-fixed/10 rounded-full scale-90 blur-3xl"></div>
<!-- Bento-style Card Layout for Illustration -->
<div class="grid grid-cols-6 grid-rows-6 gap-sm w-full h-full p-md">
<!-- Achievement Card -->
<div class="col-span-4 row-span-3 bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(26,27,75,0.04)] border border-outline-variant/30 p-md flex flex-col justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary" data-icon="workspace_premium" data-weight="fill" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Conquista</span>
</div>
<div>
<div class="font-h2 text-h2 text-primary tracking-tight">Nível 5</div>
<div class="w-full bg-surface-container-highest h-2 rounded-full mt-xs overflow-hidden">
<div class="bg-secondary-fixed-dim h-full w-[75%] rounded-full"></div>
</div>
</div>
</div>
<!-- Icon Highlight -->
<div class="col-span-2 row-span-2 bg-primary-container rounded-xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-primary-container text-display" data-icon="rocket_launch">rocket_launch</span>
</div>
<!-- Goal Checklist -->
<div class="col-span-3 row-span-3 col-start-1 row-start-4 bg-surface-container-low border border-outline-variant/20 rounded-xl p-md flex flex-col gap-sm">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="h-1.5 w-16 bg-outline-variant rounded-full"></div>
</div>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-secondary text-sm" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="h-1.5 w-20 bg-outline-variant rounded-full"></div>
</div>
<div class="flex items-center gap-xs opacity-40">
<span class="material-symbols-outlined text-outline text-sm" data-icon="radio_button_unchecked">radio_button_unchecked</span>
<div class="h-1.5 w-12 bg-outline-variant rounded-full"></div>
</div>
</div>
<!-- Score Indicator -->
<div class="col-span-3 row-span-4 col-start-4 row-start-3 bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 flex flex-col items-center justify-center p-md text-center">
<div class="relative w-16 h-16 mb-sm">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-container-highest" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-secondary" cx="32" cy="32" fill="transparent" r="28" stroke="currentColor" stroke-dasharray="175.9" stroke-dashoffset="44" stroke-width="6"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center font-numeric-xl text-numeric-xl text-primary scale-75">84</div>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">RA Score</span>
</div>
</div>
</div>
<!-- Copy Content -->
<div class="text-center w-full px-sm">
<h1 class="font-h1 text-h1 text-primary mb-md leading-tight">Complete missões e evolua</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto">
                Pague contas, cumpra metas e acompanhe seu RA financeiro crescer.
            </p>
</div>
</main>
<!-- Bottom Actions & Progress -->
<footer class="fixed bottom-0 left-0 w-full bg-surface p-lg z-40 flex flex-col items-center gap-lg">
<!-- Progress Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary transition-all duration-300"></div>
</div>
<!-- Primary CTA -->
<div class="w-full max-w-md px-container-margin">
<button class="w-full bg-primary text-on-primary py-lg rounded-xl font-body-md font-bold shadow-[0_10px_30px_rgba(2,1,53,0.12)] active:scale-95 transition-transform">
                Começar agora
            </button>
</div>
<!-- Safe area spacing -->
<div class="h-xs"></div>
</footer>
</body></html>
