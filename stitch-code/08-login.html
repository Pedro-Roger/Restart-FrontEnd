<!DOCTYPE html>

<html class="light" lang="pt-br"><head>

                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#1f1244",
                        "on-tertiary-fixed-variant": "#4b3f72",
                        "tertiary-fixed": "#e8deff",

                        "primary-container": "#1a1b4b",

<style>
        body {
            background-color: #f8f9fa;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 4px 20px rgba(26, 27, 75, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Top Bar Component (Transactional State - No Navigation) -->
<header class="fixed top-0 left-0 w-full flex items-center justify-center px-5 h-20 bg-slate-50 border-b border-slate-200 z-50">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">restart_alt</span>
</div>
<h1 class="text-lg font-extrabold tracking-tighter text-indigo-950 uppercase font-h1">Restart</h1>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex items-center justify-center p-container-margin pt-24 pb-12">
<div class="w-full max-w-md">
<!-- Branding & Intro -->
<div class="text-center mb-xl">
<h2 class="font-h1 text-h1 text-primary mb-sm">Bem-vindo de volta</h2>
<p class="font-body-md text-body-md text-outline">Acesse sua conta segura para gerenciar seu progresso financeiro.</p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest p-lg rounded-xl login-card-shadow border border-surface-variant">
<form class="space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-outline uppercase" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-tertiary-fixed focus:border-tertiary transition-all outline-none font-body-md" id="email" placeholder="nome@exemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-outline uppercase" for="password">Senha</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-tertiary-fixed focus:border-tertiary transition-all outline-none font-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-sm">
<button class="w-full h-[56px] bg-primary text-white font-body-lg font-semibold rounded-lg shadow-lg active:scale-[0.98] transition-transform hover:bg-tertiary flex items-center justify-center gap-2" type="submit">
<span>Entrar</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-surface-variant"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-2 text-outline font-label-caps">Novo por aqui?</span>
</div>
</div>
<!-- Secondary Action -->
<button class="w-full h-[56px] border-[1.5px] border-primary text-primary font-body-lg font-semibold rounded-lg hover:bg-primary-fixed transition-colors active:scale-[0.98]">
                    Criar conta
                </button>
</div>
<!-- Trust Badge -->
<div class="mt-xl flex flex-col items-center gap-md">
<div class="flex items-center gap-sm text-on-secondary-fixed-variant bg-secondary-container/30 px-md py-xs rounded-full">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-caps text-[11px] uppercase tracking-wider">Conexão Segura AES-256</span>
</div>
<div class="grid grid-cols-2 gap-md w-full max-w-xs opacity-40 grayscale">
<img alt="Visa Logo" class="h-6 object-contain mx-auto" data-alt="A clean, minimalist representation of a major credit card network logo, presented in a high-fidelity monochrome style. The lighting is flat and professional, matching a premium B2B2C fintech environment. The atmosphere conveys security and international financial standards, set against a pristine light grey background typical of modern bank interfaces." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDA0zLQtKT5FrZoctbfnoaaPxjb0cQVAjeA-AczmLtPMiBoB2M6gPQDmnuyROhs_DgPXtJFlV55zBxPoo2R64beUnHB1DL7fUBCR1BTYcBMTgGt9rQQz4_-vlXVA29M3ckpNGB7tXdpA6RIbLPcIZVMs9n_QhrWrTbQkXByHUt5NTjhTIxs2qMD3JzRTP12VPJn4MDsOZpLRibr_AFMV_Ynl23e3FudzFgAWAxeZapmSr5hCmpXewix84wywSRCfUN1Ep5K71ZdEmQ"/>
<img alt="Mastercard Logo" class="h-6 object-contain mx-auto" data-alt="A sophisticated, high-end digital rendering of a global payment processor's branding, isolated on a clean white space. The aesthetic is ultra-modern and corporate, featuring soft shadows and sharp vector-like precision. The lighting is bright and airy, reinforcing the brand's commitment to transparency and financial security in a modern digital economy." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDp4W7DO2r1KHTnmeoDzgd_Is8yAfBm3J0OLXPt44LaXmEThsSlu1gJf3MegyxFLYm7OOrI-avRbmtCAlITws87XZ_gpYJ-XDlHIJWm9hVqkke1-uP8BXMuwy12Au8ow_kP8qrj7ERIcpalfg6KBldAWjbd2yDWyMDnEtT5hDijIttEs44_PGeViPFSBFRxzc8zI4CFw6LwfR_KRVIPiQ9Pxqilz-1EK86wsngnHP-j4zwkoMp1jgNgxn4ciUl_MqZmL1G5TdSw9pM"/>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="py-lg px-container-margin text-center">
<p class="font-label-caps text-outline text-[10px] uppercase tracking-[0.1em]">
            © 2024 Restart Financial Group. Todos os direitos reservados.
        </p>
</footer>
</body></html>
