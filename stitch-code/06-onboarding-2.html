<body class="antialiased text-on-surface">

</button>
</div>
<div class="text-lg font-extrabold tracking-tighter text-indigo-950 uppercase font-manrope">

<div class="flex-grow flex flex-col items-center justify-center py-lg">
<div class="relative w-full max-w-sm aspect-square mb-xl flex items-center justify-center">

<div class="w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant mb-0.5">ESTADO</p>
<p class="font-body-md text-body-md font-bold text-secondary">Protegido</p>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="text-center space-y-md">
<h1 class="font-h1 text-h1 text-primary tracking-tight">
                    Conecte sua vida financeira
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mx-auto">
                    Com sua autorização, usamos Open Finance para acompanhar sua evolução com segurança.
                </p>
</div>
</div>

<div class="fixed bottom-0 left-0 w-full px-container-margin pb-xl pt-lg bg-gradient-to-t from-background via-background to-transparent">
